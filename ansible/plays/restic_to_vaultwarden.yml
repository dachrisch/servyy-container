---
# Copy the restic repository passwords into Vaultwarden as a human-readable
# backup copy. The seed files vars/.restic_password_* remain the source of
# truth; this playbook only PUSHES a copy and is idempotent (skips items that
# already exist by name).
#
# Auth model:
#   - API key (client_id/secret, from vars/secrets.yml) -> non-interactive
#     `bw login` with no 2FA prompt.
#   - Master password -> entered interactively via vars_prompt (like the
#     ansible-vault password prompt); never stored on disk or in git.
#
# Prerequisites:
#   1. `bw` CLI installed on the controller (already at /usr/local/bin/bw).
#   2. A personal API key generated at
#      https://pass.lehel.xyz -> Settings -> Security -> Keys -> API Key
#      and stored in vars/secrets.yml as `vaultwarden_api`.
#
# Usage:
#   cd ansible/plays && ansible-playbook restic_to_vaultwarden.yml
- name: Copy restic repository passwords into Vaultwarden
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - vars/default.yml
    - vars/secrets.yml
  vars:
    vw_server: "https://pass.lehel.xyz"
    restic_vw_items:
      - name: "restic - home (lehel.xyz)"
        password: "{{ restic_password_home }}"
        notes: "RESTIC_PASSWORD for /etc/restic/env.home (copy of Ansible seed vars/.restic_password_home)"
      - name: "restic - root (lehel.xyz)"
        password: "{{ restic_password_root }}"
        notes: "RESTIC_PASSWORD for /etc/restic/env.root (copy of Ansible seed vars/.restic_password_root)"
      - name: "restic - ls_db (lehel.xyz)"
        password: "{{ restic_password_ls_db }}"
        notes: "RESTIC_PASSWORD for /etc/restic/env.ls_db (copy of Ansible seed vars/.restic_password_ls_db)"
  vars_prompt:
    - name: vw_master_password
      prompt: "Vaultwarden master password"
      private: true
      confirm: false

  tasks:
    - name: Point bw at the self-hosted Vaultwarden
      ansible.builtin.command:
        cmd: "bw config server {{ vw_server }}"
      changed_when: false

    - name: Authenticate with API key (no 2FA prompt)
      ansible.builtin.command:
        cmd: bw login --apikey
      environment:
        BW_CLIENTID: "{{ vaultwarden_api.client_id }}"
        BW_CLIENTSECRET: "{{ vaultwarden_api.client_secret }}"
      register: bw_login
      changed_when: "'logged in' in (bw_login.stdout | lower)"
      failed_when:
        - bw_login.rc != 0
        - "'already logged in' not in (bw_login.stderr | lower)"
      no_log: true

    - name: Unlock vault with the prompted master password
      ansible.builtin.command:
        cmd: bw unlock --passwordenv BW_MASTER --raw
      environment:
        BW_MASTER: "{{ vw_master_password }}"
      register: bw_unlock
      changed_when: false
      no_log: true

    - name: Sync vault
      ansible.builtin.command:
        cmd: bw sync
      environment:
        BW_SESSION: "{{ bw_unlock.stdout }}"
      changed_when: false

    - name: List existing vault item names
      ansible.builtin.command:
        cmd: bw list items
      environment:
        BW_SESSION: "{{ bw_unlock.stdout }}"
      register: bw_items_raw
      changed_when: false
      no_log: true

    - name: Compute set of item names already present
      ansible.builtin.set_fact:
        existing_item_names: "{{ bw_items_raw.stdout | from_json | map(attribute='name') | list }}"

    - name: Create missing restic items in Vaultwarden
      ansible.builtin.shell:
        cmd: "set -o pipefail; printf '%s' {{ item_json | quote }} | bw encode | bw create item"
        executable: /bin/bash
      environment:
        BW_SESSION: "{{ bw_unlock.stdout }}"
      vars:
        item_json: >-
          {{ {'type': 1,
              'name': item.name,
              'notes': item.notes,
              'login': {'username': 'restic', 'password': item.password, 'uris': []}}
             | to_json }}
      loop: "{{ restic_vw_items }}"
      loop_control:
        label: "{{ item.name }}"
      when: item.name not in existing_item_names
      register: bw_created
      changed_when: true
      no_log: true

    - name: Report which items were created vs already present
      ansible.builtin.debug:
        msg: >-
          {{ item.name }}:
          {{ 'already present (skipped)' if item.name in existing_item_names
             else 'created' }}
      loop: "{{ restic_vw_items }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Lock the vault again
      ansible.builtin.command:
        cmd: bw lock
      changed_when: false
