- name: Setup Restic Backup Infrastructure
  hosts: all
  strategy: linear
  remote_user: "{{ create_user }}"
  become: true
  become_user: "{{ create_user }}"
  vars_files:
    - vars/default.yml
    - vars/restic.yml
    - vars/secrets.yml
  vars_prompt:
    - name: vw_master_password
      prompt: "Vaultwarden master password (enter to skip restic password backup copy)"
      private: true
      default: ""
      confirm: false
  roles:
    - restic
  tags:
    - restic
