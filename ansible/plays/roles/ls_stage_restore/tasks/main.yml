---
# Restore leaguesphere stage DB from a physical mariadb-backup set.
#
# Source: a prepared backup directory (e.g. /home/cda/ls-recovery-prewipe-*)
# Target: the leaguesphere_stage.mysql container's database
#
# Strategy:
#   1. Validate the source backup
#   2. Copy-back into a temp data dir via a throwaway MariaDB container
#   3. mysqldump the app database from the temp container
#   4. Drop & recreate the stage database, import the dump
#   5. Restart the staging app
#   6. Clean up temp artifacts
#
# Why not direct copy-back?  mariadb-backup --copy-back restores the *entire*
# data directory including the `mysql` system DB (root password, users, grants)
# from prod, which uses different credentials than stage.  The logical dump
# approach transfers only application data, preserving stage's own system tables.
#
# Usage:
#   ./servyy.sh --tags ls.stage.restore --limit lehel.xyz

- name: Load staging variables
  include_vars:
    file: "{{ playbook_dir }}/roles/ls_app/vars/secret_stage.yaml"
    name: stage_app

- name: Load production variables (for source DB root password)
  include_vars:
    file: "{{ playbook_dir }}/roles/ls_app/vars/secret_main.yaml"
    name: prod_app

- name: Install default-mysql-client
  apt:
    name: default-mysql-client
    state: present
    update_cache: false

# --------------------------------------------------------------------------
# Step 1: Verify the source backup exists and is valid
# --------------------------------------------------------------------------

- name: Check source backup directory exists
  stat:
    path: "{{ ls_stage_restore_source_path }}"
  register: source_stat
  become: true
  become_user: root
  tags:
    - ls.stage.restore

- name: Fail if source backup does not exist
  fail:
    msg: "Source backup directory not found: {{ ls_stage_restore_source_path }}. Check the path and permissions."
  when: not source_stat.stat.exists
  tags:
    - ls.stage.restore

- name: Verify backup contains mariadb_backup_checkpoints
  stat:
    path: "{{ ls_stage_restore_source_path }}/mariadb_backup_checkpoints"
  register: checkpoints_stat
  become: true
  become_user: root
  tags:
    - ls.stage.restore

- name: Fail if backup is not a valid mariadb-backup set
  fail:
    msg: "Source directory does not look like a prepared mariadb-backup set (missing mariadb_backup_checkpoints)."
  when: not checkpoints_stat.stat.exists
  tags:
    - ls.stage.restore

# --------------------------------------------------------------------------
# Step 2: Copy-back into a temporary data directory
# --------------------------------------------------------------------------

- name: Clean up any previous temp restore data dir
  file:
    path: "{{ ls_stage_restore_tmp_data }}"
    state: absent
  become: true
  become_user: root

- name: Create temp restore data directory
  file:
    path: "{{ ls_stage_restore_tmp_data }}"
    state: directory
    mode: '0755'
  become: true
  become_user: root

- name: Copy-back physical backup into temp data dir
  shell: |
    docker run --rm \
      -v {{ ls_stage_restore_tmp_data }}:/var/lib/mysql \
      -v {{ ls_stage_restore_source_path }}:/backup:ro \
      mariadb:latest mariadb-backup --copy-back --target-dir=/backup
  become: true
  become_user: root
  register: copyback_result
  changed_when: true
  tags:
    - ls.stage.restore

- name: Fix ownership on temp data dir
  shell: chown -R 999:999 {{ ls_stage_restore_tmp_data }}
  become: true
  become_user: root

# --------------------------------------------------------------------------
# Step 3: Start temporary MariaDB from the copied-back data
# --------------------------------------------------------------------------

- name: Stop any previous temp container
  shell: docker rm -f ls-restore-tmp
  become: true
  become_user: root
  changed_when: false
  ignore_errors: true
  tags:
    - ls.stage.restore

- name: Start temporary MariaDB container from restored data
  shell: |
    docker run -d --name ls-restore-tmp \
      -v {{ ls_stage_restore_tmp_data }}:/var/lib/mysql \
      --network none \
      mariadb:latest
  become: true
  become_user: root
  changed_when: true
  tags:
    - ls.stage.restore

- name: Wait for temporary MariaDB to be ready
  shell: docker exec ls-restore-tmp mariadb-admin ping -uroot -p'{{ prod_app.app.db_root_password }}'
  register: tmp_health
  until: tmp_health.rc == 0
  retries: 30
  delay: 2
  changed_when: false
  tags:
    - ls.stage.restore

# --------------------------------------------------------------------------
# Step 4: Dump source database from the temporary container
# --------------------------------------------------------------------------

- name: Set dump file path
  set_fact:
    dump_file: "/tmp/ls_stage_restore_{{ ansible_date_time.epoch }}.sql"

- name: Dump source database from temp container (ignore views)
  shell: |
    IGNORE=$(docker exec ls-restore-tmp mariadb -uroot \
      -p'{{ prod_app.app.db_root_password }}' -N \
      -e "SELECT CONCAT('--ignore-table={{ ls_stage_restore_source_db }}.', table_name) \
          FROM information_schema.views WHERE table_schema='{{ ls_stage_restore_source_db }}'")
    docker exec ls-restore-tmp mariadb-dump -uroot \
      -p'{{ prod_app.app.db_root_password }}' --single-transaction --quick --lock-tables=false \
      $IGNORE {{ ls_stage_restore_source_db }} > "{{ dump_file }}"
  become: true
  become_user: root
  changed_when: true
  tags:
    - ls.stage.restore

# --------------------------------------------------------------------------
# Step 5: Import into staging database
# --------------------------------------------------------------------------

- name: Wait for staging MySQL container health
  shell: >
    docker inspect {{ stage_app.app.name }}.mysql
    --format='{{ "{{.State.Health.Status}}" }}'
  register: stage_health
  until: stage_health.stdout == 'healthy'
  retries: 30
  delay: 2
  changed_when: false
  tags:
    - ls.stage.restore

- name: Drop and recreate staging database
  shell: |
    docker exec {{ stage_app.app.name }}.mysql \
      mariadb -uroot -p'{{ stage_app.app.db_root_password }}' \
      -e "DROP DATABASE IF EXISTS {{ stage_app.app.db_name }}; CREATE DATABASE {{ stage_app.app.db_name }} CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"
  become: true
  become_user: root
  changed_when: true
  tags:
    - ls.stage.restore

- name: Import dump into staging database
  shell: |
    cat "{{ dump_file }}" | docker exec -i {{ stage_app.app.name }}.mysql \
      mariadb -uroot -p'{{ stage_app.app.db_root_password }}' \
      {{ stage_app.app.db_name }}
  become: true
  become_user: root
  changed_when: true
  tags:
    - ls.stage.restore

# --------------------------------------------------------------------------
# Step 6: Restart staging app
# --------------------------------------------------------------------------

- name: Restart staging app container
  shell: docker restart {{ stage_app.app.name }}.staging-app
  become: true
  become_user: root
  changed_when: true
  tags:
    - ls.stage.restore

# --------------------------------------------------------------------------
# Step 7: Cleanup
# --------------------------------------------------------------------------

- name: Stop and remove temporary container
  shell: docker rm -f ls-restore-tmp
  become: true
  become_user: root
  changed_when: true
  ignore_errors: true
  tags:
    - ls.stage.restore

- name: Remove temp restore data directory
  file:
    path: "{{ ls_stage_restore_tmp_data }}"
    state: absent
  become: true
  become_user: root

- name: Remove SQL dump file
  file:
    path: "{{ dump_file }}"
    state: absent
  become: true
  become_user: root
  ignore_errors: true
