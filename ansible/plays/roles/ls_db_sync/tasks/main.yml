---
- name: Load production variables
  include_vars:
    file: "{{ playbook_dir }}/roles/ls_app/vars/secret_main.yaml"
    name: prod_app

- name: Load staging variables
  include_vars:
    file: "{{ playbook_dir }}/roles/ls_app/vars/secret_stage.yaml"
    name: stage_app

- name: Set dump file variable
  set_fact:
    sql_dump_file: "/tmp/leaguesphere_prod_{{ ansible_facts['date_time']['epoch'] }}.sql"

- name: Export DB ignoring all views
  shell: |
    IGNORE=$(mysql -h {{ prod_app.app.db_host }} \
                   -u {{ prod_app.app.db_user }} \
                   -p'{{ prod_app.app.db_password }}' \
                   -N -e "SELECT CONCAT('--ignore-table={{ prod_app.app.db_name }}.', table_name)
                          FROM information_schema.views
                          WHERE table_schema='{{ prod_app.app.db_name }}'")
    mysqldump -h {{ prod_app.app.db_host }} \
              -u {{ prod_app.app.db_user }} \
              -p'{{ prod_app.app.db_password }}' \
              --single-transaction \
              --quick \
              --lock-tables=false \
              $IGNORE \
              {{ prod_app.app.db_name }} \
              > "{{ sql_dump_file }}"
  no_log: false
  register: export_result

- name: Wait for MySQL container health
  shell: >
    docker inspect {{ stage_app.app.name + '.mysql' }}
    --format='{{ "{{.State.Health.Status}}" }}'
  register: mysql_health
  until: mysql_health.stdout == 'healthy'
  retries: 30
  delay: 2
  changed_when: false

- name: Drop and recreate staging database
  shell: |
    docker exec {{ stage_app.app.name }}.mysql \
      mariadb -u root -p'{{ stage_app.app.db_root_password }}' \
      -e "DROP DATABASE IF EXISTS {{ stage_app.app.db_name }}; CREATE DATABASE {{ stage_app.app.db_name }} CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"
  changed_when: true

- name: Drop staging finance database to allow fresh migration run
  shell: |
    docker exec {{ stage_app.app.name }}.finance-db \
      mariadb -h localhost -u root -p'{{ stage_app.app.db_finance_root_password }}' \
      -e "DROP DATABASE IF EXISTS {{ stage_app.app.db_finance_name }};"
  changed_when: true

- name: Import database
  shell: |
    (echo "SET FOREIGN_KEY_CHECKS=0;"; cat "{{ sql_dump_file }}"; echo "SET FOREIGN_KEY_CHECKS=1;") | \
    docker exec -i {{ stage_app.app.name }}.mysql \
      mariadb -u root -p'{{ stage_app.app.db_root_password }}' {{ stage_app.app.db_name }}
  changed_when: true

- name: Fake gamedays.0023 migration (column exists in prod, required by 0024+)
  shell: |
    docker exec {{ stage_app.app.name }}.mysql \
      mariadb -h localhost -u root -p'{{ stage_app.app.db_root_password }}' \
      -e "INSERT IGNORE INTO django_migrations (app, name, applied)
          VALUES ('gamedays', '0023_gameinfo_league_group', NOW());" \
      {{ stage_app.app.db_name }}
  changed_when: true

- name: Create league_table tables via sqlmigrate and record migration
  shell: |
    docker run --rm \
      --network {{ stage_app.app.name }}_backend \
      -e MYSQL_HOST={{ stage_app.app.name }}.mysql \
      -e MYSQL_DB_NAME={{ stage_app.app.db_name }} \
      -e MYSQL_USER={{ stage_app.app.db_user }} \
      -e MYSQL_PWD='{{ stage_app.app.db_password }}' \
      -e MYSQL_ROOT_PASSWORD='{{ stage_app.app.db_root_password }}' \
      -e MYSQL_FINANCE_HOST={{ stage_app.app.db_finance_host | default('finance-db') }} \
      -e MYSQL_FINANCE_DB_NAME={{ stage_app.app.db_finance_name }} \
      -e MYSQL_FINANCE_USER={{ stage_app.app.db_finance_user }} \
      -e MYSQL_FINANCE_PWD='{{ stage_app.app.db_finance_password }}' \
      -e DJANGO_SETTINGS_MODULE=league_manager.settings.stage \
      -e SECRET_KEY='{{ stage_app.app.secret_key }}' \
      leaguesphere/backend:staging \
      python manage.py sqlmigrate league_table 0001_initial 2>/dev/null \
    | grep -v '^--' \
    | docker exec -i {{ stage_app.app.name }}.mysql \
        mariadb -u root -p'{{ stage_app.app.db_root_password }}' {{ stage_app.app.db_name }}
    docker exec {{ stage_app.app.name }}.mysql \
      mariadb -h localhost -u root -p'{{ stage_app.app.db_root_password }}' \
      -e "INSERT IGNORE INTO django_migrations (app, name, applied) VALUES ('league_table', '0001_initial', NOW());" \
      {{ stage_app.app.db_name }}
  changed_when: true
  no_log: true

- name: Restart staging app
  shell: docker restart {{ stage_app.app.name }}.app

- name: Cleanup dumps
  file:
    path: "{{ sql_dump_file }}"
    state: absent
