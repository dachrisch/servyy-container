---
- name: Install mysql-client for DB export
  apt:
    name: default-mysql-client
    state: present
    update_cache: false

- name: Load production variables
  include_vars:
    file: "{{ playbook_dir }}/roles/ls_app/vars/secret_main.yaml"
    name: prod_app

- name: Load staging variables
  include_vars:
    file: "{{ playbook_dir }}/roles/ls_app/vars/secret_stage.yaml"
    name: stage_app

- name: Set dump file variable
  set_fact:
    sql_dump_file: "/tmp/leaguesphere_prod_{{ ansible_facts['date_time']['epoch'] }}.sql"

- name: Export prod DB from EXTERNAL host (ignore views)
  when: ls_db_sync_source == 'external'
  shell: |
    IGNORE=$(mysql -h {{ ls_db_sync_external_host }} -u {{ prod_app.app.db_user }} \
      -p'{{ prod_app.app.db_password }}' -N \
      -e "SELECT CONCAT('--ignore-table={{ prod_app.app.db_name }}.', table_name) \
          FROM information_schema.views WHERE table_schema='{{ prod_app.app.db_name }}'")
    mysqldump -h {{ ls_db_sync_external_host }} -u {{ prod_app.app.db_user }} \
      -p'{{ prod_app.app.db_password }}' --single-transaction --quick --lock-tables=false \
      $IGNORE {{ prod_app.app.db_name }} > "{{ sql_dump_file }}"
  changed_when: true

- name: Export prod DB from LOCAL container (ignore views)
  when: ls_db_sync_source == 'local'
  shell: |
    IGNORE=$(docker exec {{ ls_db_sync_local_container }} mariadb -u root \
      -p'{{ prod_app.app.db_root_password }}' -N \
      -e "SELECT CONCAT('--ignore-table={{ prod_app.app.db_name }}.', table_name) \
          FROM information_schema.views WHERE table_schema='{{ prod_app.app.db_name }}'")
    docker exec {{ ls_db_sync_local_container }} mariadb-dump -u root \
      -p'{{ prod_app.app.db_root_password }}' --single-transaction --quick --lock-tables=false \
      $IGNORE {{ prod_app.app.db_name }} > "{{ sql_dump_file }}"
  changed_when: true

- name: Wait for MySQL container health
  shell: >
    docker inspect {{ stage_app.app.name + '.mysql' }}
    --format='{{ "{{.State.Health.Status}}" }}'
  register: mysql_health
  until: mysql_health.stdout == 'healthy'
  retries: 30
  delay: 2
  changed_when: false

- name: Drop and recreate staging database
  shell: |
    docker exec {{ stage_app.app.name }}.mysql \
      mariadb -u root -p'{{ stage_app.app.db_root_password }}' \
      -e "DROP DATABASE IF EXISTS {{ stage_app.app.db_name }}; CREATE DATABASE {{ stage_app.app.db_name }} CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"
  changed_when: true

- name: Copy dump file into MySQL container
  shell: |
    docker cp "{{ sql_dump_file }}" {{ stage_app.app.name }}.mysql:/tmp/dump.sql
  changed_when: true

- name: Import dump into staging database
  shell: |
    cat "{{ sql_dump_file }}" | docker exec -i {{ stage_app.app.name }}.mysql \
      mariadb -u root -p'{{ stage_app.app.db_root_password }}' \
      {{ stage_app.app.db_name }}
  changed_when: true

- name: Cleanup dump from MySQL container
  shell: |
    docker exec {{ stage_app.app.name }}.mysql rm /tmp/dump.sql
  changed_when: true
  ignore_errors: true

- name: Restart staging app
  shell: docker restart {{ (stage_app.app.name ~ '.staging-app') if stage_app.app.name == 'leaguesphere_stage' else (stage_app.app.name ~ '.app') }}

- name: Cleanup dumps
  file:
    path: "{{ sql_dump_file }}"
    state: absent
