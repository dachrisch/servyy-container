---
# Defaults for ls_db_sync role
# No defaults needed - all variables come from secret_main.yaml and secret_stage.yaml

# 'external' = dump from the external host below (pre-cutover)
# 'local'    = dump from the local prod container leaguesphere.db (validation + post-cutover)
ls_db_sync_source: "external"
# Source host for the 'external' dump. Kept separate from secret_main.yaml's app.db_host
# because the cutover repoints app.db_host to the local container (leaguesphere.db), which
# would otherwise break the external dump. Override with -e if the external host moves.
ls_db_sync_external_host: "s207.goserver.host"
ls_db_sync_local_container: "leaguesphere.db"
