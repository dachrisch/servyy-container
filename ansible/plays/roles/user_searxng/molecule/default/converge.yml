---
- name: Converge
  hosts: all
  become: true
  vars:
    container_project_name: searxng
    container_home: /home/molecule
    vault_searxng_secret_key: "test-secret-key-for-molecule"
    vault_searxng_google_token: "test-google-token"
    vault_searxng_duckduckgo_token: "test-duckduckgo-token"
    vault_searxng_brave_token: "test-brave-token"
  pre_tasks:
    - name: Create proxy network for testing
      community.docker.docker_network:
        name: proxy
        state: present

    - name: Create searxng service directory
      ansible.builtin.file:
        path: /home/molecule/searxng
        state: directory
        mode: "0755"

    - name: Create docker-compose.yml for testing
      ansible.builtin.copy:
        dest: /home/molecule/searxng/docker-compose.yml
        mode: "0644"
        content: |
          name: searxng
          services:
            core:
              container_name: searxng.core
              image: "docker.io/searxng/searxng:latest"
              networks:
                - proxy
              labels:
                - "traefik.enable=true"
          networks:
            proxy:
              external: true
  tasks:
    - name: Include user_searxng role  # noqa: role-name[path]
      ansible.builtin.include_role:
        name: "{{ playbook_dir }}/../../"
        tasks_from: main.yml
