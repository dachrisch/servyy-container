---
- name: Create core-config directory
  file:
    path: "{{ container_home }}/searxng/core-config"
    state: directory
    mode: "0755"

- name: Deploy settings.yml with vault secret
  template:
    src: settings.yml.j2
    dest: "{{ container_home }}/searxng/core-config/settings.yml"
    mode: "0644"

- name: Generate .env file with secrets
  template:
    src: env.j2
    dest: "{{ container_home }}/searxng/.env"
    mode: "0600"

- name: Deploy searxng services (from git location)
  community.docker.docker_compose_v2:
    project_src: "{{ playbook_dir }}/../../../../searxng"
    state: present
    project_name: searxng
