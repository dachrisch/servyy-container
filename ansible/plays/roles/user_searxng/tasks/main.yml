---
- name: Stop searxng services before config update
  community.docker.docker_compose_v2:
    project_src: "{{ container_home }}/searxng"
    state: absent
  ignore_errors: true

- name: Fix core-config directory ownership
  ansible.builtin.file:
    path: "{{ container_home }}/searxng/core-config"
    state: directory
    owner: "{{ ansible_facts['user_id'] }}"
    group: "{{ ansible_facts['user_id'] }}"
    recurse: true
  become: true
  become_user: root

- name: Deploy settings.yml with engine tokens and secrets
  template:
    src: settings.yml.j2
    dest: "{{ container_home }}/searxng/core-config/settings.yml"
    mode: "0600"

- name: Generate .env file with secrets
  template:
    src: env.j2
    dest: "{{ container_home }}/searxng/.env"
    mode: "0600"

- name: Deploy searxng services
  community.docker.docker_compose_v2:
    project_src: "{{ container_home }}/searxng"
    state: present
