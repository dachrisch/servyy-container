---
# Deploy restic backup scripts and timers
- name: Create backup scripts directory
  file:
    path: "{{ remote_user_home }}/.backup-scripts"
    state: directory
    mode: '0755'
  tags:
    - restic.backup

# Home backup
- name: Deploy restic backup script for home
  template:
    src: restic_backup.sh.j2
    dest: "{{ remote_user_home }}/.backup-scripts/restic-backup-home.sh"
    mode: '0750'
  vars:
    backup_name: "home"
    source_path: "{{ restic.home.source_path }}"
    excludes: "{{ restic.home.excludes }}"
    exclude_caches: "{{ restic.exclude_caches }}"
    log_file: "{{ restic.logs.backup_home }}"
  tags:
    - restic.backup

- import_tasks: oneshot_include.yml
  vars:
    service:
      name: restic-backup-home
      description: 'Restic backup - home directory'
      schedule: '{{ restic.schedules.backup_home }}'
      command: "{{ remote_user_home }}/.backup-scripts/restic-backup-home.sh"
  tags:
    - restic.backup

# Root backup
- name: Deploy restic backup script for root
  template:
    src: restic_backup.sh.j2
    dest: "{{ remote_user_home }}/.backup-scripts/restic-backup-root.sh"
    mode: '0750'
  vars:
    backup_name: "root"
    source_path: "{{ restic.root.source_path }}"
    includes: "{{ restic.root.includes }}"
    excludes: "{{ restic.root.excludes }}"
    exclude_caches: "{{ restic.exclude_caches }}"
    log_file: "{{ restic.logs.backup_root }}"
    with_sudo: true
  tags:
    - restic.backup

- import_tasks: oneshot_include.yml
  vars:
    service:
      name: restic-backup-root
      description: 'Restic backup - root filesystem'
      schedule: '{{ restic.schedules.backup_root }}'
      command: "{{ remote_user_home }}/.backup-scripts/restic-backup-root.sh"
  tags:
    - restic.backup

# LeagueSphere prod DB backup (mariadb-backup -> prepared current set)
- name: Load prod app vars for backup creds
  include_vars:
    file: "{{ playbook_dir }}/roles/ls_app/vars/secret_main.yaml"
    name: ls_prod
  tags: [restic.backup]

- name: Deploy mariadb-backup script
  template:
    src: mariadb_backup.sh.j2
    dest: "{{ remote_user_home }}/.backup-scripts/mariadb-backup-ls.sh"
    mode: '0750'
  vars:
    ls_backup_host_dir: "/var/jail/home/leaguesphere/container/mysql-backup"
    ls_backup_user: "{{ ls_prod.app.db_backup_user }}"
    ls_backup_password: "{{ ls_prod.app.db_backup_password }}"
  no_log: true
  tags: [restic.backup]

- import_tasks: oneshot_include.yml
  vars:
    service:
      name: mariadb-backup-ls
      description: 'mariadb-backup of leaguesphere prod db'
      schedule: '{{ restic.schedules.backup_ls_db_dump | default("*-*-* *:40:00") }}'
      command: "{{ remote_user_home }}/.backup-scripts/mariadb-backup-ls.sh"
  tags: [restic.backup]
