---
# Orchestrator for Restic role

# Pre-flight: recover missing restic password seed files from Vaultwarden (or
# prompt the operator) BEFORE any restic_password_* var is dereferenced, so a
# missing seed never silently generates a new password. Tagged for init AND
# recreate so it guards the destructive recreate path too.
# `apply.tags` is REQUIRED: with dynamic include_tasks, tags on the include
# statement do NOT propagate to the included tasks, so under `--tags restic.init`
# / `--tags restic.recreate` the guard's inner tasks would be skipped (no-op)
# without it — defeating the guard on exactly the recreate path it must protect.
- name: Guard restic password seed files
  include_tasks:
    file: seed_guard.yml
    apply:
      tags:
        - restic
        - restic.init
        - restic.recreate
  tags:
    - restic
    - restic.init
    - restic.recreate

- name: Initialize Restic Infrastructure
  include_tasks: init.yml
  tags:
    - restic
    - restic.init

- name: Setup Test Environment
  include_tasks: test_setup.yml
  when: inventory_hostname == 'servyy-test.lxd'
  tags:
    - restic
    - restic.test

- name: Manual Lockout Recovery
  include_tasks: recreate.yml
  when: ansible_run_tags | intersect(['restic.recreate']) | length > 0
  tags:
    - restic.recreate

# ----------------------------------------------------------------------------
# INTEGRATED RESTORE (Critical for recovery)
# ----------------------------------------------------------------------------
# These tasks always run to ensure data is "re-hydrated" on fresh hosts.
# The decision matrix inside restore.yml ensures they SKIP on healthy hosts.

- name: Restore Gitea Data
  include_tasks: restore.yml
  vars:
    restore_path: "{{ (docker.remote_dir, 'git', 'repos') | path_join }}"
    backup_name: "{{ (inventory_hostname == 'servyy-test.lxd') | ternary('test', 'home') }}"
    owner: "root"
  when: (with_containers | default(false)) | bool
  tags:
    - restic
    - restic.restore

- name: Restore PhotoPrism Database
  include_tasks: restore.yml
  vars:
    restore_path: "{{ (docker.remote_dir, 'photoprism', 'database') | path_join }}"
    backup_name: "{{ (inventory_hostname == 'servyy-test.lxd') | ternary('test', 'home') }}"
    owner: "{{ create_user }}"
  when: (with_containers | default(false)) | bool
  tags:
    - restic
    - restic.restore

- name: Restore Vaultwarden Data
  include_tasks: restore.yml
  vars:
    restore_path: "{{ (docker.remote_dir, 'pass', 'vw-data') | path_join }}"
    backup_name: "{{ (inventory_hostname == 'servyy-test.lxd') | ternary('test', 'home') }}"
    owner: "root"
  when: (with_containers | default(false)) | bool
  tags:
    - restic
    - restic.restore

# RECOVERY (manual, after restore.yml repopulates current/):
#   1. docker compose -p leaguesphere stop db
#   2. empty /var/jail/home/leaguesphere/container/deployed/mysql-data
#   3. docker run --rm \
#        -v /var/jail/home/leaguesphere/container/deployed/mysql-data:/var/lib/mysql \
#        -v /var/jail/home/leaguesphere/container/deployed/mysql-backup/current:/backup \
#        mariadb:latest mariadb-backup --copy-back --target-dir=/backup
#   4. chown -R 999:999 /var/jail/home/leaguesphere/container/deployed/mysql-data
#   5. docker compose -p leaguesphere start db ; verify health
- name: Restore LeagueSphere Prod DB Backup
  include_tasks: restore.yml
  vars:
    restore_path: "/var/jail/home/leaguesphere/container/deployed/mysql-backup/current"
    backup_name: "db"
    owner: "root"
    # Shown ONLY when restic actually restored the set (fresh/empty host or
    # force_restore). restic restores the backup FILES into current/; loading
    # them into the live DB is a deliberate manual copy-back — see below.
    post_restore_notice: |
      ════════════════════════════════════════════════════════════════════
      ⚠️  LEAGUESPHERE DB RESTORE: backup FILES restored — DB is NOT live yet
      ════════════════════════════════════════════════════════════════════
      restic restored the prepared mariadb-backup set to:
        /var/jail/home/leaguesphere/container/deployed/mysql-backup/current

      The leaguesphere.db container is still on a FRESH/EMPTY data dir. To
      load the backup into the live database you MUST run copy-back manually
      on this host (one-time, after a disaster rebuild or data loss):

        cd /var/jail/home/leaguesphere/container/deployed
        docker compose -p leaguesphere stop db
        sudo rm -rf mysql-data/*
        docker run --rm \
          -v $(pwd)/mysql-data:/var/lib/mysql \
          -v $(pwd)/mysql-backup/current:/backup \
          mariadb:latest mariadb-backup --copy-back --target-dir=/backup
        sudo chown -R 999:999 mysql-data    # mariadb uid inside the image
        docker compose -p leaguesphere start db

      Until copy-back runs, leaguesphere.db serves an EMPTY schema.
      Full runbook: docs/leaguesphere-environments.md → "Prod DB restore procedure"
      ════════════════════════════════════════════════════════════════════
  when: (with_containers | default(false)) | bool
  tags:
    - restic
    - restic.restore

# ----------------------------------------------------------------------------
# OPERATIONALIZE (Backup schedules)
# ----------------------------------------------------------------------------

- name: Deploy Backup Schedules and Timers
  include_tasks: backup.yml
  tags:
    - restic
    - restic.backup
