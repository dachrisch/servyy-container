---
# Restic backup configuration
restic:
  # Home directory backup (hourly)
  home:
    enabled: true
    repository: "sftp://storagebox/{{ storagebox_credentials.share }}/{{ inventory_hostname }}/restic-home"
    password: "{{ restic_password_home }}"
    source_path: "{{ remote_user_home }}"
    excludes:
      # Version control
      - '**/.git'
      - '**/.git/worktrees'
      - '.zprezto/.git'

      # Caches (use restic's --exclude-caches for CACHEDIR.TAG)
      - '.cache'
      - '**/.cache'
      - '**/node_modules'
      - '**/__pycache__'
      - '**/.pytest_cache'
      - '**/.mypy_cache'
      - '**/.tox'
      - '**/.venv'

      # Build artifacts
      - '**/target'        # Rust
      - '**/dist'
      - '**/build'

      # Large data directories
      - 'pgdata'
      - 'go/pkg'           # Go packages cache
      - 'go/bin'

      # Temporary files
      - '**/*.tmp'
      - '**/*.swp'
      - '**/*~'

  # Root filesystem backup (daily)
  root:
    enabled: true
    repository: "sftp://storagebox/{{ storagebox_credentials.share }}/{{ inventory_hostname }}/restic-root"
    password: "{{ restic_password_root }}"
    source_path: "/"
    includes:
      - /etc           # System configuration
      - /var           # Variable data
    excludes:
      # System pseudo-filesystems
      - /proc
      - /sys
      - /dev
      - /run
      - /tmp
      - /mnt
      - /media

      # Container runtime layers (NEVER backup - rebuildable)
      - /var/lib/docker
      - /var/lib/containerd

      # Caches
      - /var/cache
      - /var/tmp
      - /var/lib/snapd/cache

      # Logs (rebuildable / handled by journald retention)
      - /var/log

      # LXD runtime namespace pseudo-files (unreadable, cause restic exit 3)
      - /var/snap/lxd/common/ns

      # Sockets and swap
      - '*.sock'
      - 'swap.img'
      - '*.swap'

  # LeagueSphere prod DB backup (hourly)
  db:
    enabled: true
    repository: "sftp://storagebox/{{ storagebox_credentials.share }}/{{ inventory_hostname }}/restic-ls-db"
    password: "{{ restic_password_ls_db }}"
    source_path: "/var/jail/home/leaguesphere/container/deployed/mysql-backup/current"

  # Backup schedules
  schedules:
    backup_home: 'hourly'                      # Home: every hour at :00
    backup_root: 'daily'                       # Root: once per day at 00:00
    backup_ls_db: 'hourly'                     # DB: every hour at :00
    backup_ls_db_dump: '*-*-* *:40:00'        # mariadb-backup dump: :40 past every hour
    forget_daily: '*-*-* 05:00:00'            # Daily at 05:00 UTC
    check_weekly: 'Sun 06:00'                 # Weekly integrity check

  # GFS retention policy — PER REPOSITORY.
  #
  # A single aggressive policy (keep-hourly 2 / keep-daily 2 / keep-monthly 3) was
  # previously applied to every repo, including the HOURLY `db` repo. That pruned
  # every DB snapshot within ~2 days, so a problem noticed days later had no
  # recoverable backup (LeagueSphere gd874 data-loss, 2026-07). Retention is now
  # sized per repo, with the production DB kept generously in both the short and
  # long term. restic de-duplicates, so a slowly-changing DB keeps many snapshots
  # cheaply.
  retention:
    home:
      last: 24
      hourly: 48     # ~2 days of hourly
      daily: 14
      weekly: 8
      monthly: 6
    root:
      last: 7
      daily: 30      # daily backup → no hourly bucket
      weekly: 12
      monthly: 12
    db:
      last: 48
      hourly: 72     # 3 days of hourly
      daily: 30      # a month of dailies
      weekly: 12
      monthly: 12

  # SFTP connection settings via SSH config
  sftp:
    ssh_key_path: "{{ remote_user_home }}/.ssh/id_storagebox"
    host_alias: "storagebox"  # SSH config host alias
    hostname: "{{ storagebox_credentials.host }}"
    username: "{{ storagebox_credentials.user }}"
    port: 23  # Hetzner Storage Box uses port 23
    # SSH key authentication configured via ~/.ssh/config
    # Host key verification disabled for automation (StrictHostKeyChecking=no)

  # Log files
  log_dir: '/var/log/restic'
  logs:
    backup_home: '/var/log/restic/backup-home.log'
    backup_root: '/var/log/restic/backup-root.log'
    backup_ls_db: '/var/log/restic/backup-ls-db.log'
    forget: '/var/log/restic/forget.log'
    check: '/var/log/restic/check.log'

  # Global settings
  exclude_caches: true  # Use --exclude-caches to skip folders with CACHEDIR.TAG
