      path: /etc/grafana/provisioning/dashboards/security

  - name: 'leaguesphere'
    orgId: 1
    folder: 'LeagueSphere'
    type: file
    disableDeletion: false
    editable: false
    options:
      path: /etc/grafana/provisioning/dashboards/leaguesphere
