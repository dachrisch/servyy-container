global:
  scrape_interval: 15s
scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: [ 'localhost:9090' ]
  - job_name: 'pushgateway'
    honor_labels: true
    static_configs:
      - targets: ['pushgateway:9091']
    scrape_interval: 5s
  - job_name: 'cadvisor'
    static_configs:
      - targets: [ 'cadvisor:8080' ]
  - job_name: 'node-exporter'
    static_configs:
      - targets: [ 'node-exporter:9100' ]
  - job_name: 'traefik'
    static_configs:
      - targets: [ 'traefik.traefik:8082' ]
  - job_name: 'loki'
    static_configs:
      - targets: [ 'loki:3100' ]
  - job_name: 'k6-load-test'
    static_configs:
      - targets: [ 'localhost:6565' ]
    scrape_interval: 5s
    scrape_timeout: 5s
    metrics_path: '/metrics'